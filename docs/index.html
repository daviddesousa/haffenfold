<!DOCTYPE html>
<html lang="en">
  <head>
    <meta content="width=device-width, initial-scale=1" name="viewport"/>
    <title>Haffenfold</title>
    <meta name="description" content="Always seeking both sides of the journey, through sounds and moments, Haffenfold are masters of the split image. Without their other half, they are left to fold. A clash of tastes is the catalyst to oscillation between bitter analog techno and mesmerizing progressions. A friendship born within the purest of interests, they set out to showcase the dancefloor odyssey in mirror opposites.">

    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png?v=2">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png?v=2">
    <link rel="manifest" href="/site.webmanifest?v=2">
    <link rel="mask-icon" href="/safari-pinned-tab.svg?v=2" color="#5bbad5">
    <link rel="shortcut icon" href="/favicon.ico?v=2">
    <meta name="msapplication-TileColor" content="#ffffff">
    <meta name="theme-color" content="#ffffff">
    <link rel="preconnect" href="https://widget.sndcdn.com">
    <link href="assets/styles.css?v=20260320" rel="stylesheet" type="text/css">
  </head>
  <body>
    <nav>
      <ul class="menu">
        <li>
          <a href="https://www.beatport.com/artist/haffenfold/434331" rel="noreferrer" target="_blank">beatport</a>
        </li>
        <li>
          <a href="https://soundcloud.com/haffenfold" rel="noreferrer" target="_blank">soundcloud</a>
        </li>
        <li class="menu-link--facebook">
          <a href="https://www.facebook.com/haffenfold" rel="noreferrer" target="_blank">facebook</a>
        </li>
        <li>
          <a href="https://instagram.com/haffenfold" rel="noreferrer" target="_blank">instagram</a>
        </li>
        <li>
          <a href="mailto:haffenfold@gmail.com" rel="noreferrer" target="_blank">contact</a>
        </li>
      </ul>
    </nav>
    <header>
      <button id="arcade-button" class="push-button push--flat no-select" aria-haspopup="dialog" aria-controls="arcade-dialog" aria-label="Open Bore popup">BORED</button>
      <a class="scroll link--listen" href="#audio-player" title="Scroll to audio player"><span style="color:#fff;">list</span>en</a>
    </header>
    <dialog id="arcade-dialog" class="arcade-dialog" aria-label="BORE overlay">
      <button id="arcade-close" class="dialog-close" aria-label="Close">
        <span class="dialog-close-icon"><span>✕</span></span>
      </button>
      <div class="dialog-image-container">
        <img class="bore-links-image" src="assets/haffenfold-bore-links.webp" alt="BORE download and stream links">
        <a class="dialog-image-link link--beatport" target="_blank" title="Download Bore on Beatport" href="https://www.beatport.com/track/bore/24511043" rel="noopener noreferrer" autofocus><span class="sr-only">Beatport</span></a>
        <a class="dialog-image-link link--spotify" target="_blank" title="Stream Bore on Spotify" href="https://open.spotify.com/album/6Pb3q5qNEqYVnQD4dciwrA" rel="noopener noreferrer"><span class="sr-only">Spotify</span></a>
        <a class="dialog-image-link link--apple-music" target="_blank" title="Stream Bore on Apple Music" href="https://music.apple.com/us/album/bore/1880446302?i=1880446671" rel="noopener noreferrer"><span class="sr-only">Apple Music</span></a>
      </div>
    </dialog>
    <main id="audio-player" class="audio-embed">
      <iframe style="border-radius:12px" src="https://open.spotify.com/embed/artist/2b22KV07lFaJYxVmpdiCkq?utm_source=generator&theme=0" width="100%" height="470" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
    </main>
    <script>
      (function(i,s,o,g,r,a,m){i['GoogleAnalyticsObject']=r;i[r]=i[r]||function(){
          (i[r].q=i[r].q||[]).push(arguments)},i[r].l=1*new Date();a=s.createElement(o),
              m=s.getElementsByTagName(o)[0];a.async=1;a.src=g;m.parentNode.insertBefore(a,m)
      })(window,document,'script','//www.google-analytics.com/analytics.js','ga');

      ga('create', 'UA-48524515-1', 'haffenfold.com');
      ga('send', 'pageview');

      // Smooth scroll to anchor
      document.querySelectorAll('.scroll').forEach(link => {
        link.addEventListener('click', (e) => {
          e.preventDefault();
          const targetID = link.getAttribute('href');
          const target = document.querySelector(targetID);
          if (target) {
            target.scrollIntoView({ behavior: 'smooth' });
          }
        });
      });

      (function() {
        const arcadeBtn = document.getElementById('arcade-button');
        const arcadeDialog = document.getElementById('arcade-dialog');
        const arcadeClose = document.getElementById('arcade-close');

        if (arcadeBtn && arcadeDialog) {
          arcadeBtn.addEventListener('click', () => {
            if (typeof arcadeDialog.showModal === 'function') {
              arcadeDialog.showModal();
            } else {
              arcadeDialog.style.display = 'block';
            }
          });
        }

        function closeDialog() {
          if (!arcadeDialog) return;
          if (typeof arcadeDialog.close === 'function') {
            arcadeDialog.close();
          } else {
            arcadeDialog.style.display = 'none';
          }
        }

        if (arcadeClose) {
          arcadeClose.addEventListener('click', closeDialog);
        }

        if (arcadeDialog) {
          arcadeDialog.addEventListener('click', event => {
            if (event.target === arcadeDialog) closeDialog();
          });
        }
      })();
    </script>
  </body>
</html>
